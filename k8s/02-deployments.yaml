apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: telemedicine/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5173"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5000"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:4001"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:4002"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:4003"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine-service:4004"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:4005"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:4006"
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 20
