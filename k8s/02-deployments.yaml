                  key: AUTH_SERVICE_API_KEY
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:4006"
            - name: NOTIFICATION_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: NOTIFICATION_SERVICE_API_KEY
