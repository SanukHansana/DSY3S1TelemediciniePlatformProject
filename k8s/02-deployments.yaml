apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: telemedicine/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: AUTH_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: AUTH_JWT_SECRET
            - name: AUTH_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: AUTH_SERVICE_API_KEY
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
