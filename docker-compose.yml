services:

  # -------------------------
  # PATIENT SERVICE
  # -------------------------
  patient-service:
    build: ./services/patient-service
    ports:
      - "4001:4001"
    env_file:
      - ./services/patient-service/.env
    depends_on:
      - patient-db

  patient-db:
    image: mongo
    container_name: patient-db
    ports:
      - "27017:27017"

  # -------------------------
  # DOCTOR SERVICE
  # -------------------------
  doctor-service:
    build: ./services/doctor-service
    ports:
      - "4002:4002"
    env_file:
      - ./services/doctor-service/.env
    depends_on:
      - doctor-db

  doctor-db:
    image: mongo
    container_name: doctor-db
    ports:
      - "27018:27017"

  # -------------------------
  # APPOINTMENT SERVICE
  # -------------------------
  appointment-service:
    build: ./services/appointment-service
    ports:
      - "4003:4003"
    env_file:
      - ./services/appointment-service/.env
    depends_on:
      - appointment-db

  appointment-db:
    image: mongo
    container_name: appointment-db
    ports:
      - "27019:27017"

  # -------------------------
  # TELEMEDICINE SERVICE
  # -------------------------
  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "4004:4004"
    env_file:
      - ./services/telemedicine-service/.env

  # -------------------------
  # PAYMENT SERVICE
  # -------------------------
  payment-service:
    build: ./services/payment-service
    ports:
      - "4005:4005"
    env_file:
      - ./services/payment-service/.env
    depends_on:
      - payment-db

  payment-db:
    image: mongo
    container_name: payment-db
    ports:
      - "27020:27017"

  # -------------------------
  # NOTIFICATION SERVICE
  # -------------------------
  notification-service:
    build: ./services/notification-service
    ports:
      - "4006:4006"
    env_file:
      - ./services/notification-service/.env